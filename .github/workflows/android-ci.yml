name: Android CI/CD Pipeline

# Controls when the workflow will run
on:
  push:
    branches: [ "main", "develop" ]
  pull_request: {}
  
jobs:
  build:
    name: Build & Test Android App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
   
      # Step 2: Set up Java Development Kit (JDK)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # Automatically caches Gradle dependencies for faster builds

      # Step 3: Grant execution rights to the Gradle wrapper wrapper script
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Step 4: Run Static Code Analysis (Linting)
      - name: Run Code Analysis (Lint)
        run: ./gradlew lintDebug

      # Step 5: Run Unit Tests
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # Step 6: Assemble Debug APK file
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Step 7: Save the generated APK file so you can download it from GitHub
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
